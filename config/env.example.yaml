# Beispiel-Config fuer clm (v1)
# Kopiere nach config/env.yaml und passe an.

repo_path: ~/ContainerLiveMigration

hosts:
  monitor:
    host: local
    ip: 192.168.13.20
  source:
    host: benke1
    ip: 192.168.13.10
  dest:
    host: benke2
    ip: 192.168.13.15

paths:
  share_root: /mnt/criu
  runs_root: /mnt/criu/runs
  logs_root: /mnt/criu/logs

vip:
  addr: 192.168.13.50
  cidr: /24
  port: 8080
  if_source: enp1s0
  if_dest: enp1s0

postcopy:
  lazy_port: 27027
  src_lazy_ip: 192.168.13.10
  # Uebergangs-Forwarding auf Source aktivieren, damit Readiness-Waiting vor
  # finalem VIP-Cutover den client-sichtbaren Ausfall nicht aufblaeht.
  src_forwarding_enabled: 1
  src_forwarding_mode: iptables_dnat
  src_forwarding_target_host: 192.168.13.15
  src_forwarding_target_port: 8080
  readiness_urls:
    - http://192.168.13.15:8080/health
  # Low-downtime Default: Readiness-Gate wieder aktiv (mit Forwarding).
  readiness_stable_successes: 3
  readiness_interval_ms: 200
  readiness_timeout_ms: 10000
  probe_max_time_s: 2
  warmup_urls:
    - http://192.168.13.15:8080/ready
    - http://192.168.13.15:8080/counter
  warmup_rounds: 1
  warmup_interval_ms: 0
  warmup_max_duration_ms: 400

container:
  name: testweb
  image: benke/testweb:phase3
  bundle: /mnt/criu/runc-bundle
  # Wird bei clm run vor jedem Lauf via patch_runc_bundle_for_criu.sh ins Bundle geschrieben.
  gunicorn:
    workers: 1
    threads: 4

migration:
  net_mode: host
  container_ip_dest: 172.18.0.5
  # VIP-Cutover Tuning
  vip_garp_count: 3
  vip_garp_interval_ms: 200
  # A | U | both
  vip_garp_mode: A
  # Optionaler Source-seitiger conntrack flush beim Cutover.
  vip_conntrack_clear_src: 0

# Optional
precopy:
  # shared = Restore direkt aus dem Shared-CRIU-Pfad auf dem Ziel.
  # local_copy = altes Verhalten: komplette Image-Kette nach /var/lib/criu-local kopieren.
  image_mode: shared
  # Aktueller Idle-Bestwert: 0 vermeidet die teure Parent-Image-Kette im Restore.
  pre_dump_rounds: 0
  tcp_established: 1

monitor:
  # Polling-Intervalle
  http_interval_ms: 50
  l4_interval_ms: 50
  # Wenn null/ausgelassen: wird aus Intervall abgeleitet.
  http_timeout_ms: null
  l4_timeout_ms: null
  # Erzwingt Timeout < Intervall (reduziert "blinde Flecken" bei Haengern).
  enforce_timeout_below_interval: true
  # Zeitoffset-Schaetzung (source/dest gegen monitor) pro Run.
  clock_offset_samples: 3
  # Mess-Overhead reduzieren: optional info/counter/stream deaktivieren.
  precision_mode: false
  enable_info_targets: true
  enable_counter_targets: true
  enable_stream_targets: true
  # Optionaler Burst um Cutover-Events (0 = aus).
  burst_window_ms: 0
  burst_http_interval_ms: 10
  burst_l4_interval_ms: 10
  burst_trigger_events:
    - vip_cutover_start
    - vip_cutover_done

cleanup:
  # never | success_only | always
  shared_images_policy: success_only
  local_images_policy: success_only

load:
  # wrk1..3 sind als eigenstaendige CLM-Lastszenarien nutzbar:
  #   clm run --load wrk1|wrk2|wrk3
  wrk1:
    target: vip
    parallel: 1
    threads: 1
    connections: 10
    duration_s: 30
    timeout_s: 2
    path: /health
    latency: true

  wrk2:
    target: vip
    parallel: 1
    threads: 1
    connections: 20
    duration_s: 30
    timeout_s: 2
    path: /health
    latency: true

  wrk3:
    target: vip
    parallel: 1
    threads: 1
    connections: 50
    duration_s: 30
    timeout_s: 2
    path: /health
    latency: true
